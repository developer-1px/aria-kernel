name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: developer-1px/zod-crud
          path: _zod-crud-checkout
      - run: |
          mkdir -p ../zod-crud
          cp -r _zod-crud-checkout/. ../zod-crud/
          rm -rf _zod-crud-checkout
        shell: bash
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Build zod-crud sibling
        working-directory: ../zod-crud
        run: |
          npm install --no-audit --no-fund
          npm run build -w packages/zod-crud
        shell: bash
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vite build
        env:
          GITHUB_PAGES: 'true'
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
